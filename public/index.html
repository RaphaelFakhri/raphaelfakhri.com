<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raphael Fakhri</title>
  <style>
    :root { color-scheme: light dark; }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh; display: grid; place-items: center;
      font: 500 clamp(1rem,4vw,1.5rem)/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(120% 120% at 50% 0%, #1a1a2e 0%, #0d0d14 60%, #08080c 100%);
      color: #e8e8f0; text-align: center; padding: 2rem;
    }
    .wrap { display: grid; gap: 1.25rem; max-width: 40ch; }
    h1 {
      font-size: clamp(2.5rem, 12vw, 5rem); font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(120deg, #a78bfa, #60a5fa 60%, #34d399);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    p { opacity: 0.75; }
    .tag {
      justify-self: center; margin-top: 0.5rem; font-size: 0.8rem; letter-spacing: 0.1em;
      text-transform: uppercase; opacity: 0.45;
    }
    a { color: #60a5fa; text-decoration: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Hello, world.</h1>
    <p>This is <strong>raphaelfakhri.com</strong> — running on Cloudflare, deployed from GitHub.</p>
    <p class="tag">Raphael Fakhri · coming soon</p>
  </main>
</body>
</html>
